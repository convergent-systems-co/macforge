version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - revive
    - gocritic
    - bodyclose
  settings:
    revive:
      rules:
        # `exported` enforces godoc comments on all exported identifiers.
        # `disableStutteringCheck` suppresses the "func config.NewConfig
        # stutters" finding — these constructors are intentionally namespaced
        # by package to keep the audit-code-prefix obvious at the call site.
        - name: exported
          arguments:
            - disableStutteringCheck
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
