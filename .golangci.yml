version: "2"

run:
  go: "1.26"
  timeout: 5m
  tests: true

linters:
  enable:
    # standard set
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # extras
    - gocyclo
    - misspell
    - revive
    - gocritic
  settings:
    gocyclo:
      min-complexity: 12
    revive:
      severity: warning
      rules:
        - name: exported
          arguments: [disableStutteringCheck]
        - name: package-comments
          disabled: true   # we'll add when packages have public surface
    misspell:
      locale: US

formatters:
  enable:
    - gofmt

issues:
  # v2 no longer accepts `exclude-use-default` — v2's default is already
  # "no default exclusions applied," so omitting it preserves intent.
  max-issues-per-linter: 0
  max-same-issues: 0
